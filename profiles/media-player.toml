name = "media-player"
description = "Profil pour lecteurs multimédia (VLC, MPV)"

[network]
disable = false

[filesystem]
read_only = ["/usr", "/lib", "/lib64", "/bin", "/etc/fonts", "/etc/ssl"]
read_write = ["/tmp", "/home"]

[seccomp]
strict = false
whitelist = false
hardening = true
allow_groups = ["io", "memory"]
allow_syscalls = []