[filesystem]
mode = "whitelist"
mounts = [
  { path = "/tmp", access = "rw" },
  { path = "/usr", access = "ro" },
  { path = "/lib", access = "ro" },
]

[syscalls]
mode = "whitelist"
allow_groups = ["io", "memory"]
allow = ["exit", "exit_group"]

[network]
mode = "none"

[capabilities]
allow = []

[resources]
max_memory = "256M"
max_cpu = "25%"
max_procs = 10
timeout = "5m"
